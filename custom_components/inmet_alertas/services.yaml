atualizar_alertas:
  name: Atualizar Alertas
  description: Força a atualização dos alertas meteorológicos do INMET
  fields:
    estado:
      name: Estado
      description: Estado específico para atualizar (opcional - se não informado, atualiza todos)
      required: false
      example: "RJ"
      selector:
        select:
          options:
            - "AC"
            - "AL"
            - "AP"
            - "AM"
            - "BA"
            - "CE"
            - "DF"
            - "ES"
            - "GO"
            - "MA"
            - "MT"
            - "MS"
            - "MG"
            - "PA"
            - "PB"
            - "PR"
            - "PE"
            - "PI"
            - "RJ"
            - "RN"
            - "RS"
            - "RO"
            - "RR"
            - "SC"
            - "SP"
            - "SE"
            - "TO"